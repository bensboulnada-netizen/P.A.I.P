<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>/*CSS*/
body{
    margin:0;/*Suppression des espaces blancs*//*ازاله الفراغات البيضاء*/
    min-height:100vh; /*La hauteur occupe tout l'écran.*//*الارتفاع يأخذ كامل الشاشة.*/
    display:flex;/*Fabrique des objets au milieu*/ /*يجعل العناصر في الوسط.*/
    justify-content:center;/*Placez la boîte exactement au milieu.*//*تجعل الصندوق بالوسط تماماً.*/
    align-items:center;/*Placez la boîte exactement au milieu.*//*تجعل الصندوق بالوسط تماماً.*/
    background-size:cover;/*Un arrière-plan qui ne laisse aucune lacune*//*خلفيه لا تترك فراغ*/
    background-position:center;
    font-family:Arial;/*Toutes les lignes sont claires*//*كل الخطوط واضحه*/
}
.quiz{ 
    background:rgba(175, 195, 241, 0.85);/*Un fond semi-transparent, laissant apparaître une partie du fond de la page originale.*//*خلفية شبه شفافة، تظهر بعض الشيء من الخلفية الأصلية للصفحة*/
    padding:25px;/*Pour les éléments à l'intérieur de la boîte qui ne collent pas aux bords*//*لمحتوى داخل الصندوق لا يلتصق بالحواف*/
    width:500px;/*Taille de la boîte*//*حجم الصندوق*/
    border-radius:10px;/*Les bords de la boîte sont arrondis.*//*حواف الصندوق مستديره*/
    text-align:center;/*Boutons et texte au centre de la boîte*//*ازرار والنصوص في الوسط الصندوق*/
}
.answer{
    width:100%;/*Les choix de réponses s'étendent sur toute la largeur de la zone de questionnaire.*//*خيارات الإجابة تمتد على كامل عرض صندوق الكويز*/
    margin:6px 0;/*Il y a un espace entre chaque choix de réponse.*//*هناك فراغ بين كل خيار إجابة والآخر*/
    padding:12px;/*Le texte de chaque option ne colle pas aux bords.*//*النص داخل كل خيار لا يلتصق بالحواف.*/
    font-size:18px; /* Options de taille de police*//*حجم خط الاختيارات*/
    font-weight:500;/*Taille de la police*//*حجم الخط*/
    border-radius:8px;/* Le bouton a des coins arrondis.*//*زوايا الزر مستديره*/
    border:1px solid #0e1a52;/*Couleur de l'ombre du bouton*//*لون ظل الزر*/
    transition:0.3s;/*Cela permet à tout changement de se dérouler en douceur.*//*يجعل اي تغيير يحدث بسلاسه*/
}
.answer:hover {
    background-color: #7da7ff;/*Changer la couleur de fond au survol de la souris.*//*تغيير لون الخلفية عند المرور بالماوس*/
    cursor: pointer;/*Changez le curseur de la souris en forme de main.*//*تغيير شكل الماوس على شكل اليد*/
    transform:scale(1.03);/*Agrandir la taille du bouton*//*تكبير حجم الزر*/
}
.correct{
    background:green;color:white;/*Lorsque l'utilisateur sélectionne une réponse correcte, celle-ci apparaît en vert.*//*عندما يختار المستخدم جوابًا صحيحًا يظهر باللون الأخضر*/
}
.wrong{
    background:red;color:white;/*Lorsqu'un utilisateur choisit une réponse incorrecte, celle-ci apparaît en rouge.*//*عندما يختار المستخدم جوابًا خاطئًا يظهر باللون الأحمر*/
}
#next{
    background:#5145ba;/*Couleur d’arrière-plan du bouton*//*لون خلفيه الزر*/
    color:white;/*Couleur du texte*//*لون النص*/
    padding:10px 15px;/*Distance intérieure*//*مسافة داخلية*/
    margin-top:15px;/*Distance externe*//*مسافة خارجية*/
    border:none;/*Supprimer un cadre*//*إزالة إطار*/
    border-radius:6px;/*Bords arrondis*//*حواف مستديره*/
    cursor:pointer;/*Changez le curseur de la souris en forme de main.*//*تغيير شكل الماوس على شكل اليد*/
    display:none;/*Le fait de masquer le bouton initialement ne le fait apparaître qu'après qu'une réponse ait été choisie.*/
    /*إخفاء الزر في البداية لا يظهر إلا بعد اختيار إجابة.*/
}
#next:hover{ background:#918cc1; }/*Changer la couleur de fond au survol de la souris.*//*تغيير لون الخلفيه حينما يمر الماوس*/
#title{
    font-size:28px; /*Taille de la police*//*حجم الخط*/
    color:#2a1b52; /* Couleur de police*//*لون الخط*/
    font-weight:bold; /*Ligne grasse*//* خط عريض */
    margin-bottom:15px;/*La distance entre le titre et la question*//*المسافه بين العنوان والسؤال*/
}
#q{
    font-size:22px;/* Taille de la police des questions*//*حجم خط السؤال*/
    font-weight:600;/*Largeur de ligne*//*عرض الخط*/
    margin-bottom:15px;/*La distance entre la question et les choix*//*المسافه بين السؤال والاختيارات*/
    color:#5b6b84;/*Question de couleur*//*اللون السؤال*/
}
</style>

/*L'utilisateur a sélectionné une langue et un numéro.
Nous avons récupéré les questions de langue depuis la base de données.
Nous avons extrait uniquement le nombre de questions requis.
Nous les avons intégrées au questionnaire.
Nous avons commencé par la question 0.
Le score initial était de 0.*/
/*المستخدم اختار لغة وعدد.
 أخذنا أسئلة اللغة من db.
 أخذنا منها فقط العدد المطلوب.
 خزناها في quiz.
 بدأنا من السؤال 0.
 بدأنا النقاط من 0*/
let quiz=db[cat].slice(0,num);
let i=0,score=0;
function load(){
  //Le bouton Suivant disparaît et ne réapparaît qu'après la sélection d'une nouvelle réponse.
  //زر Next يختفي لا يظهر إلا بعد اختيار إجابة جديدة
 document.getElementById("next").style.display="none";
 //Effacer les boutons de réponse précédents prépare l'espace pour les réponses à la nouvelle question.
 //مسح أزرار الإجابة السابقة تجهيز المكان لإجابات السؤال الجديد.
 document.getElementById("answers").innerHTML="";
 /*Un utilisateur répond à des questions.
i s'incrémente.
La fin est atteinte.
La condition est remplie.
Le résultat s'affiche.
Le code s'arrête.*/
/*لمستخدم يجيب على الأسئلة.
 i يزيد.
 يصل للنهاية.
 الشرط يتحقق.
 يتم عرض النتيجة.
 يتم إيقاف الكود.*/
 if(i>=quiz.length){
  let percent = Math.round((score / quiz.length) * 100);
  // 🔥 تحويل اسم اللغة ل key صحيح
  let key = cat.toLowerCase();
  if(key === "javascript") key = "js";
  if(key === "c++") key = "cpp";
  // 🔥 تخزين النتيجة
  localStorage.setItem(key, percent);
  document.querySelector(".quiz").innerHTML = `
    <h2>Votre score : ${score} / ${quiz.length}</h2>
    <h3>${percent}% 🎯</h3>
    <br><br>
    <button onclick="goProfile()">
        Voir My Skills 🚀
    </button>
  `;
  return;
}
 let q=quiz[i];
 /*Le texte de la question apparaît à l'utilisateur
  يظهر نص السؤال للمستخدم*/
 document.getElementById("q").innerText=q.q;
/*Nous récupérons la question actuelle.
Nous affichons son texte.
Nous parcourons ses options.
Nous créons un bouton pour chaque option.
Nous l'associons à une fonction de vérification.
Nous l'ajoutons à la page.*/
/*نأخذ السؤال الحالي.
 نعرض نصه.
 نمر على خياراته.
ننشئ زرًا لكل خيار.
 نربطه بدالة check.
نضيفه للصفحة.*/
 q.a.forEach((x,j)=>{
  let b=document.createElement("button");
  b.className="answer";
  b.innerText=x;
  b.onclick=()=>check(j);
  answers.appendChild(b);
 });
}
/*L'utilisateur clique sur une réponse.
Les boutons cessent de fonctionner.
Les réponses correctes apparaissent en vert, les réponses incorrectes en rouge.
Si la réponse est correcte, un point est ajouté.
Le bouton  Suivant  apparaît pour passer à la question suivante.
Cliquer sur  Suivant  affiche la question suivante.*/
/*المستخدم يضغط على إجابة.
 تتوقف الأزرار عن العمل .
 تظهر الإجابة الصحيحة بالأخضر والخاطئة بالأحمر.
 إذا كانت الإجابة صحيحة، يتم إضافة نقطة.
 يظهر زر Next للانتقال للسؤال التالي.
 عند الضغط على Next، يظهر السؤال التالي*/
function check(j){
 let good=quiz[i].c;
 document.querySelectorAll(".answer").forEach((b,k)=>{
  b.disabled=true;
  if(k==good)b.classList.add("correct");
  if(k==j && j!=good)b.classList.add("wrong");
 });
 if(j==good)score++;
 next.style.display="block";
}
next.onclick=()=>{i++;load();};
load();
</script>
</body>
</html>
