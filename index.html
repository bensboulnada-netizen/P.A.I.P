<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plateforme d'apprentissage et d'interaction en programmation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            background-color: #0F172A;
        }
        h1 {
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            color: #fa9571;
            text-align: center;
            padding: 20px;
        }
        h4 {
            color: #fa9571;
        }
        .logo {
           border-radius:50%; 
           text-decoration:none;  
           box-shadow:0 0 10px rgb(169, 232, 247); 
           z-index:999;
        }
        .intro-text {
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 40px;   
            background: linear-gradient(90deg, #fa9571, #ffddc1, #7dd3fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .level-btn {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            border: none;
            border-radius: 20px;
            padding: 22px;
            transition: 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            margin-top: 35px;
            font-size: 40px;
            font-weight: bold;
        }
        .level-btn:hover {
            transform: scale(1.07);
            box-shadow: 0 0 30px rgba(255, 126, 95, 0.8);
        }
        .level-btn a {
           color: #ffffff !important;
           font-size: 45px !important;
           font-weight: bold;
           text-shadow: 0 2px 6px rgba(0,0,0,0.5);
           display: inline-block;
        }
        .level-btn img {
            width: 60px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container my-4">
        <img class="logo" src="logo.jpg" width="200" height="150" alt="Logo">
        <h4>P.A.I.PR</h4>
    </div>
    <div class="container">
        <h1>Développez votre carrière</h1>
    </div>
    <div class="container">
        <p class="intro-text">
            ✨ Portail vers le monde de la technologie et de la programmation, 
               nous offrons des outils et des ressources pour les développeurs et les passionnés. 💻🚀
        </p>
    </div>
    <div class="container">
        <div class="row">
            <div class="col-12 col-md-4 mx-auto text-center">
                <a href="hiba.html" id="b1" class="btn w-100 level-btn">
                    ✨Entrez dans le monde du code 💻
                    <br>
                    <img src="https://funnel-images-cdn.codefinity.com/876ebfba081030a0ed5efe801008ce0ce19355aa.png" alt="">
                </a>
            </div>
        </div>
    </div>
    <script>
        $(document).ready(function(){
            $("#b1")
            .css("color", "#fff")
            .slideUp(1000)
            .slideDown(1000)
            .fadeOut(500)
            .fadeIn(1500);
        });
    </script>
</body>
</html>
