<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Skills 🚀</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}
.header{
    padding:20px;
    font-size:28px;
    font-weight:bold;
    text-align:center;
}
.card{
    background:#ffffff;
    color:#333;
    width:400px;
    margin:30px auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    text-align:center;
}
.avatar{
    width:90px;
    border-radius:50%;
    margin-bottom:10px;
}
.stats{
    display:flex;
    justify-content:space-around;
    margin:15px 0;
}
.box{
    background:#f1f1f1;
    padding:10px;
    border-radius:10px;
    width:90px;
}
.skill{
    margin:12px 0;
    text-align:left;
}
.skill span{
    font-size:14px;
    font-weight:bold;
}
.progress{
    background:#ddd;
    height:12px;
    border-radius:10px;
    overflow:hidden;
}
.bar{
    height:100%;
    width:0%;
    border-radius:10px;
    transition:1s;
}
.html{background:#e34c26;}
.css{background:#264de4;}
.js{background:#f0db4f;}
.python{background:#306998;}
.php{background:#8892be;}
.poo{background:#16a085;}
.cpp{background:#00599c;}
.rank{
    margin-top:15px;
    font-weight:bold;
    font-size:18px;
}
.nav{
    background:#000;
    padding:10px;
    height: 80px;
    max-width: 100%;
    text-align: center;
}
.nav a{
    color:white;
    margin:10px;
    text-decoration:none;
    font-weight:bold;
    font-size: 30px;
    font-style: italic;
    text-align: center;
}
</style>
</head>
<body>
    <div class="nav">
        <a href="hiba2.html">🏠 Accueil</a>
        <a href="rania.html">🤖 AI</a>
        <a href="meriem1.html">📝 Quiz</a>
    </div>
<div class="header">🚀 My Skills Tracker</div>
<div class="card">
<img class="avatar" src="utilisateur.png">
<div class="stats">
    <div class="box">🏆<br><span id="total"></span></div>
    <div class="box">🔥<br><span id="streak"></span></div>
</div>
<div class="skill">HTML <span id="htmlText"></span>
    <div class="progress"><div class="bar html" id="htmlBar"></div></div>
</div>
<div class="skill">CSS <span id="cssText"></span>
    <div class="progress"><div class="bar css" id="cssBar"></div></div>
</div>
<div class="skill">JavaScript <span id="jsText"></span>
    <div class="progress"><div class="bar js" id="jsBar"></div></div>
</div>
<div class="skill">Python <span id="pythonText"></span>
    <div class="progress"><div class="bar python" id="pythonBar"></div></div>
</div>
<div class="skill">PHP <span id="phpText"></span>
    <div class="progress"><div class="bar php" id="phpBar"></div></div>
</div>
<div class="skill">POO <span id="pooText"></span>
    <div class="progress"><div class="bar poo" id="pooBar"></div></div>
</div>
<div class="skill">C++ <span id="cppText"></span>
    <div class="progress"><div class="bar cpp" id="cppBar"></div></div>
</div>
<div class="rank" id="rank"></div>
</div>
<script>
let html = parseInt(localStorage.getItem("html")) || 0;
let css = parseInt(localStorage.getItem("css")) || 0;
let js = parseInt(localStorage.getItem("js")) || 0;
let python = parseInt(localStorage.getItem("python")) || 0;
let php = parseInt(localStorage.getItem("php")) || 0;
let poo = parseInt(localStorage.getItem("poo")) || 0;
let cpp = parseInt(localStorage.getItem("cpp")) || 0;
let total = Math.round((html+css+js+python+php+poo+cpp)/7);
document.getElementById("total").innerText = total + "%";
function setBar(id, textId, value){
    document.getElementById(id).style.width = value + "%";
    document.getElementById(textId).innerText = value + "%";
}
setBar("htmlBar","htmlText",html);
setBar("cssBar","cssText",css);
setBar("jsBar","jsText",js);
setBar("pythonBar","pythonText",python);
setBar("phpBar","phpText",php);
setBar("pooBar","pooText",poo);
setBar("cppBar","cppText",cpp);
let rank="Beginner 😅";
if(total>=50) rank="Intermediate 💪";
if(total>=75) rank="Pro 🔥";
if(total>=90) rank="Master 😎";
document.getElementById("rank").innerText = rank;
let today = new Date().toDateString();
let last = localStorage.getItem("lastLogin");
let streak = parseInt(localStorage.getItem("streak")) || 0;
if(last !== today){
    streak++;
    localStorage.setItem("streak", streak);
    localStorage.setItem("lastLogin", today);
}
document.getElementById("streak").innerText = streak;
</script>
</body>
</html>
